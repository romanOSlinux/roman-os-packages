---
# Build the target initramfs with the systemd-based hooks (systemd + sd-encrypt + …)
# instead of the busybox ones (udev + encrypt).
#
# Why: on an encrypted install the busybox `encrypt` hook prompts for the LUKS
# passphrase through the Plymouth theme's script callback, which does not render at
# boot — the prompt is invisible and the user has to type it blind. With the systemd
# hooks, `sd-encrypt` asks via systemd-ask-password, which Plymouth's built-in password
# agent renders reliably as a themed prompt (this is what CachyOS does).
#
# initcpiocfg auto-adds the `plymouth` hook itself (detect_plymouth) before the encrypt
# hook, and the bootloader module switches the kernel cmdline to `rd.luks.uuid=…`
# automatically once it sees a systemd HOOKS line — so this one flag is all that's needed.
# Tradeoff: no busybox emergency recovery shell.
useSystemdHook: true
source: "/etc/mkinitcpio.conf"
