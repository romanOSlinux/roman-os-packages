efi:
    mountPoint:         "/boot/efi"
    recommendedSize:    2000MiB
    minimumSize:        32MiB
    label:              "EFI"

userSwapChoices:
    - none      # Create no swap, use no swap
    - small     # Up to 4GB
    - suspend   # At least main memory size — enables hibernation
    - file      # To swap file instead of partition

swapPartitionName:      swap

luksGeneration: luks2

drawNestedPartitions:   false

alwaysShowPartitionLabels: true

initialPartitioningChoice: none

initialSwapChoice: none

defaultFileSystemType:  "ext4"

# Left empty on purpose: Calamares then auto-picks gpt on UEFI and msdos on BIOS.
# A hardcoded gpt breaks legacy-BIOS GRUB installs (no bios_grub partition →
# grub-install "embedding is not possible"). See the nemesis fork's GRUB+LUKS2.md.
# Needed now that luksGeneration is luks2 and GRUB installs include BIOS machines.
defaultPartitionTableType: ""

enableLuksAutomatedPartitioning:    false

lvm:
    enable: false
