displaymanagers:
  - sddm

# No defaultDesktopEnvironment hardcode → the module is desktop-agnostic: it
# auto-detects the installed session by the priority list in main.py
# (full DEs > xfce > window managers). This is what lets a no-xfce build
# (e.g. pure Cinnamon, or a WM-only build) set a valid default and log in.

basicSetup: false

sysconfigSetup: false

sddm:
  configuration_file: "/etc/sddm.conf.d/kde_settings.conf"