backend: pacman

skip_if_no_internet: false
# update_db disabled: a failing `pacman -Sy` here (no internet / dead mirror) is
# fatal and aborts the install at ~99% with "Package Manager error". roman-os_before
# already does a best-effort `-Sy`, and try_remove below needs no synced DB.
update_db: false
update_system: false

pacman:
  num_retries: 1
  disable_download_timeout: true
  needed_only: true

operations:
  - try_remove:
    - calamares
    - roman-os-calamares-tweak-tool
    - mkinitcpio-archiso
    - memtest86+
    - memtest86+-efi
