defaultGroups:
    - name: users
      must_exist: true
      system: true
    - lp
    - power
    - video
    - network
    - storage
    - name: wheel
      must_exist: false
      system: true
    - audio
    - sys
    - optical
    - scanner
    - rfkill
    - i2c

autologinGroup:  autologin

doAutologin:     false

sudoersGroup:    wheel

sudoersConfigureWithGroup: true

setRootPassword: true

doReusePassword: true

user:
  shell: /bin/fish
  forbidden_names: [ root ]
  home_permissions: "o700"

avatarFilePath: ~/.face

hostname:
  location: EtcFile
  writeHostsFile: true
  forbidden_names: [ localhost ]
