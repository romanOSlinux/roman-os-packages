# ============================================================================
# Tell NetworkManager not to manage the loopback interface
# ============================================================================
# Adopted from Garuda's unmanaged-lo.conf (2026-05-28 comparison study).
# See: roman-os-iso/docs/garuda-comparison-2026-05-28.md
#
# Recent NetworkManager versions try to manage `lo` and log a benign warning
# about it on every boot. The loopback interface needs no management — it's
# brought up at boot by systemd and never changes. This drop-in silences the
# noise without changing any actual network behavior.

[keyfile]
unmanaged-devices=interface-name:lo
