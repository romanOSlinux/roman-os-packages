# ============================================================================
# AMD GPU Driver Module Parameters
# ============================================================================

# AMD GPU Feature Enablement
#
# ppfeaturemask=0xffffffff
#   - Enable ALL power management and performance features including OverDrive
#   - Required to expose manual fan/clock/voltage controls in tools like CoreCtrl
#   - Known to cause GPU resets on early Vega and some Navi 10/14 cards under
#     load; if you see GPU hangs, try 0xfffd7fff (disables OverDrive only)
#
options amdgpu ppfeaturemask=0xffffffff

# Optional: GPU memory overclock (advanced, use with caution)
# Uncomment only if you know what you're doing
# options amdgpu sclk=7 mclk=3 voltage_overdrive=10
