# ============================================================================
# HDA Intel Audio Driver Parameters
# ============================================================================

# Realtek HDA (High Definition Audio)
# These settings reduce latency, prevent crackling, and manage power:
#   - power_save_controller: Enables aggressive power management
#   - power_save: Time in seconds before codec powers down (0 = never)
#   - jackpoll_ms: Poll interval for jack detection (500ms = standard; 0 disables detection)
#   probe_mask is intentionally omitted so all codecs are probed (required for HDMI audio)
#
options snd_hda_intel \
    power_save_controller=1 \
    power_save=1 \
    jackpoll_ms=500

# Note: If experiencing audio issues:
# - Try power_save=15 (autosuspend after 15 seconds)
# - Or completely disable: power_save=0 power_save_controller=0
