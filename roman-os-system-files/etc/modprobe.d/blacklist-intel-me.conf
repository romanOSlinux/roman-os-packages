# ============================================================================
# Intel Management Engine Driver Blacklist
# ============================================================================
# Adopted from Garuda's noime.conf (2026-05-28 comparison study).
# See: roman-os-iso/docs/garuda-comparison-2026-05-28.md
#
# The Intel ME (mei / mei_me) driver exposes the on-die Management Engine
# subsystem to userspace. ME is a separate, always-on co-processor with
# network access and has a long history of remote-code-execution CVEs
# (e.g. CVE-2017-5705 / SA-00086). Blacklisting the kernel modules does
# NOT disable ME itself (only a BIOS toggle or me_cleaner does that) but
# closes the userspace attack surface, removes one always-loaded driver,
# and aligns roman-os with Whonix / Tails / Garuda hardening defaults.
#
# Tradeoff: breaks vPro / AMT remote management — not used by desktop
# users. AMD machines load nothing here either way.
#
# Kernel-agnostic: applies to any kernel that ships the mei drivers.

blacklist mei
blacklist mei_me
