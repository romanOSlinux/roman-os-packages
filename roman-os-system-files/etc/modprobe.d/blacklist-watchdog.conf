# ============================================================================
# Watchdog Timer Blacklist
# ============================================================================
# Prevent loading of problematic watchdog drivers that can cause:
#   - System hangs during boot
#   - Unexpected resets
#   - Kernel debug output spam
#   - CPU overhead

# Intel TCO (Time Coordinated Output) Watchdog
# Problematic on: Older Intel platforms, ASUS boards
blacklist iTCO_wdt

# AMD SP5100 Watchdog Timer
# Problematic on: AMD platforms, compatibility issues with NMI
blacklist sp5100_tco

# Optional: If experiencing watchdog issues, also blacklist:
# blacklist i6300esb
# blacklist w83627hf_wdt
# blacklist it87_wdt
