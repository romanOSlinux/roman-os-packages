# ============================================================================
# Bluetooth USB Driver Options
# ============================================================================
# Adopted from Garuda's bluetooth-usb.conf (2026-05-28 comparison study).
# See: roman-os-iso/docs/garuda-comparison-2026-05-28.md
#
# reset=1 forces a USB-level reset on every probe of a Bluetooth USB
# controller. Fixes the common "Bluetooth works after a cold boot but
# never wakes up after suspend/resume" pattern that plagues several
# Intel AX200/AX201/AX210 and Realtek RTL8822* combo cards.
#
# Safe default on recent kernels — the reset is fast and the symptom it
# prevents is one of the most-reported Bluetooth bugs on Arch.
#
# Kernel-agnostic: applies to any kernel that loads btusb.

options btusb reset=1
