# ============================================================================
# Intel Ethernet Driver Parameters
# ============================================================================

# E1000E Driver (Intel Gigabit)
# These settings improve latency and throughput:
#   - Enable smart speed for automatic downshift
#   - Reduce interrupt load
#   - Improve jumbo frame handling
#
options e1000e SmartPowerDownEnable=1 InterruptThrottleRate=0

# Alternative: For maximum latency reduction (server use)
# options e1000e InterruptThrottleRate=0 TxAbsIntDelay=0 RxAbsIntDelay=0

# IGB Driver (Intel Gigabit Fiber/Copper)
options igb InterruptThrottleRate=0

# IXGBE Driver (Intel 10 Gigabit)
options ixgbe InterruptThrottleRate=0 LRO=1

# I40E Driver (Intel 40 Gigabit)
options i40e InterruptThrottleRate=0
