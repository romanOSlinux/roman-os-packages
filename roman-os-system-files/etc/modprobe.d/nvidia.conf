# ============================================================================
# GPU Driver Module Parameters
# ============================================================================

# NVIDIA GPU Optimizations
#
# NVreg_UsePageAttributeTable=1
#   - Use PAT (Page Attribute Table) for CPU performance
#   - Improves CPU-GPU memory transfer speed
#
# NVreg_InitializeSystemMemoryAllocations=0
#   - Skip memory clearing on allocation for GPU
#   - Reduces initialization overhead
#   - Single-user desktop only: on multi-user systems this allows one user's
#     GPU buffer contents to be visible to another user's process
#
# NVreg_DynamicPowerManagement=0x02
#   - Enable mobile GPU power saving (laptop-friendly)
#   - 0x00 = off, 0x01 = coarse, 0x02 = fine
#
# NVreg_RegistryDwords=RMIntrLockingMode=1
#   - Enable frame-pacing for consistent frame rates
#   - Reduces microstuttering in games/media
#
options nvidia NVreg_UsePageAttributeTable=1
options nvidia NVreg_InitializeSystemMemoryAllocations=0
options nvidia NVreg_DynamicPowerManagement=0x02
options nvidia NVreg_RegistryDwords=RMIntrLockingMode=1

# Optional: Increase NVIDIA VRAM reserve for better performance
# Uncomment if you have plenty of VRAM (>4GB)
# options nvidia NVreg_RegistryDwords=PrivilegedDeviceFile=/dev/null
