# ============================================================================
# Realtek Ethernet Driver Parameters
# ============================================================================

# R8169 Driver (Realtek Gigabit)
# The modern r8169 driver exposes very few stable module parameters.
# use_dac enables 64-bit DMA addressing — left at default (0) because
# some older boards and BIOSes have buggy 64-bit DMA support that causes
# transfer errors. The driver auto-enables it safely when the hardware
# is verified.
#
# Most r8169 tuning is better done at runtime via ethtool (see 62-network-optimization.rules).

# Optional: EEE (Energy Efficient Ethernet) — reduces power on idle links
# Disable if experiencing link drops or latency spikes on resume
# options r8169 eee_enable=0
