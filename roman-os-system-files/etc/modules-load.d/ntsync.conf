# ============================================================================
# ntsync — NT synchronization primitives (Wine/Proton acceleration)
# ============================================================================
# ntsync emulates Windows NT sync objects (mutexes, events, semaphores) in the
# kernel instead of in userspace. Wine and Proton fall back to slow eventfd/
# futex emulation without it; with ntsync, sync-heavy games and apps see a
# large CPU and frame-time improvement.
#
# The module ships in roman-os's default kernel (linux-cachyos) and in linux-zen,
# but is NOT autoloaded by default. Loading it at boot makes the acceleration
# available to Wine/Proton automatically. Harmless on kernels that lack it —
# systemd-modules-load simply skips a module it can't find.
ntsync
