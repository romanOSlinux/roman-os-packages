# ============================================================================
# roman-os-ISO Global Resource Limits
# ============================================================================
# System-wide resource limits for all users
# Ensures adequate resources for modern applications

# File descriptor limits
# Allows applications to open many files/sockets
*  soft  nofile  65535
*  hard  nofile  1048576

# Process/thread limits
# Modern apps (browsers, IDEs) create many threads
*  soft  nproc   30000
*  hard  nproc   30000

# Memory locking limits
# Allows applications to lock pages in RAM
*  soft  memlock unlimited
*  hard  memlock unlimited

# Message queue limits
# Supports IPC and message passing
*  soft  msgqueue 819200
*  hard  msgqueue 819200
