# ============================================================================
# roman-os-ISO Systemd Journal Configuration
# ============================================================================
# See: man journald.conf

[Journal]

# ============================================================================
# Storage Strategy
# ============================================================================

# "persistent" keeps logs in /var/log/journal across reboots.
# "volatile" was previously used but means no logs survive a crash or
# boot failure — users cannot debug problems after the fact.
Storage=persistent

# ============================================================================
# Size Limits
# ============================================================================

# Max total journal size on disk
SystemMaxUse=100M

# Max size per journal file before rotation
SystemMaxFileSize=50M

# Minimum disk space to keep free before dropping old journal files
SystemKeepFree=500M

# Maximum number of journal files to retain
SystemMaxFiles=10

# ============================================================================
# Runtime Limits (RAM, used while system is up before rotation)
# ============================================================================

RuntimeMaxUse=32M
RuntimeMaxFileSize=16M
RuntimeKeepFree=64M
RuntimeMaxFiles=8

# ============================================================================
# Log Level and Filtering
# ============================================================================

# Store warning and above; info-level chatter is excluded.
# Change to "info" temporarily when debugging a service.
MaxLevelStore=warning
MaxLevelSyslog=warning
MaxLevelKMsg=warning

# ============================================================================
# Log Forwarding
# ============================================================================

ForwardToSyslog=no
ForwardToKMsg=yes
ForwardToConsole=no

# ============================================================================
# Retention
# ============================================================================

MaxFileSec=1d
MaxRetentionSec=3d

# ============================================================================
# Compression and Integrity
# ============================================================================

Compress=yes

# Cryptographic sealing has negligible benefit on a desktop and adds overhead
Seal=no

# ============================================================================
# Synchronization
# ============================================================================

# Sync to disk every 5 minutes; "immediate" is safer but slower
SyncIntervalSec=300

# ============================================================================
# Special Handling
# ============================================================================

SplitMode=none
Audit=no

# ============================================================================
# Rate Limiting
# ============================================================================

# Max 5000 messages per 30-second window before a service's logs are dropped.
# This prevents a runaway logger from filling the journal.
RateLimitIntervalSec=30s
RateLimitBurst=5000
