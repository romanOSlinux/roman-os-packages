# ============================================================================
# roman-os-ISO systemd-oomd Global Tuning
# ============================================================================
# Adopted from Garuda's systemd-oomd-defaults (2026-05-28 comparison study).
# See: roman-os-iso/docs/garuda-comparison-2026-05-28.md
#
# Why oomd: the kernel OOM killer reacts to memory exhaustion, by which point
# the system is already swapping itself to death. systemd-oomd watches PSI
# memory pressure and intervenes EARLIER, killing the worst offender slice
# before the desktop goes unresponsive. Paired with our ZRAM setup
# (zram-generator.conf) this gives a smooth response under memory load on
# 4-8 GiB systems.
#
# Requires systemd-oomd.service to be enabled (handled by Calamares
# services-systemd in roman-os-calamares-config[-next]) AND MemoryAccounting=true
# on slices (already set in system.conf.d/90-memory-accounting.conf).
#
# Per-slice kill policy is configured in:
#   - system/system.slice.d/10-roman-os-oomd-per-slice.conf
#   - user/slice.d/10-roman-os-oomd-per-slice.conf

[OOM]

# How long memory pressure must stay above the per-slice limit before oomd acts.
# Default: 30s. Garuda uses 20s — a touch more responsive without making oomd
# trigger on transient browser/IDE allocation spikes.
DefaultMemoryPressureDurationSec=20s
