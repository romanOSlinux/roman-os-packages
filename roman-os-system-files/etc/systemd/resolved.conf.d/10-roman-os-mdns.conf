[Resolve]
# Disable systemd-resolved's built-in mDNS responder.
# avahi-daemon owns mDNS on this system; running both causes conflicts
# and avahi logs a warning every boot about a duplicate mDNS stack.
MulticastDNS=no
# Stop resolved from parsing the hBlock hosts file (455k lines).
# NSS still reads /etc/hosts directly, so ad-blocking and local names work.
ReadEtcHosts=no
