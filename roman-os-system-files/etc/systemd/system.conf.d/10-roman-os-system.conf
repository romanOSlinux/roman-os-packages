# ============================================================================
# roman-os-ISO Systemd System Configuration
# ============================================================================
# Global systemd tuning for responsiveness and efficiency
# See: man systemd-system.conf

[Manager]

# ============================================================================
# Service Behavior - Faster failure detection
# ============================================================================

# Default timeout for starting services
# Default: 90 seconds. 30s is a safe reduction that still covers slow-starting
# services like databases, Samba, libvirtd, and complex firewall setups.
DefaultTimeoutStartSec=30s

# Default timeout for stopping services
# Default: 90 seconds
# Recommendation: 15s (faster shutdown without killing slow services too soon)
DefaultTimeoutStopSec=15s

# Timeout for emergency shells (emergency.target)
# Default: 30 seconds
# Recommendation: 5s (won't wait long for interactive shell)
DefaultTimeoutAbortSec=5s

# ============================================================================
# Resource Limits - Support modern applications
# ============================================================================

# Default limit for file descriptors per service
# Default: 65535 (good)
# Recommendation: keep default or increase to 1048576
DefaultLimitNOFILE=1048576

# Default limit for processes per service
# Default: 30000
# Recommendation: keep default (reasonable for multi-threaded apps)
DefaultLimitNPROC=30000

# ============================================================================
# Task Limits - Support modern applications
# ============================================================================

# Maximum number of tasks (threads) per unit
# Modern applications create many threads (browsers, IDEs need 50-150).
# infinity removes all protection against fork-bomb or runaway thread
# creation. 65536 is well above any real-world app requirement.
DefaultTasksMax=65536

# ============================================================================
# Service Restart Protection - Prevent restart loops
# ============================================================================

# Time window for counting service restarts
# Default: 10 seconds (too aggressive)
# Recommendation: 5 minutes (reasonable grace period)
DefaultStartLimitIntervalSec=5min

# Maximum restarts within interval before giving up
# Default: 3 (too strict)
# Recommendation: 5 (allows brief restart storms, then backs off)
DefaultStartLimitBurst=5

# Default limit for memory per service (soft)
# Default: unlimited
# Recommendation: infinity (let kernel handle OOM)
DefaultLimitAS=infinity

# Default CPU affinity for services
# Default: none (any CPU)
# Recommendation: none (let scheduler handle it)
# DefaultCPUAffinity=

# ============================================================================
# Watchdog - Prevent hung systemd
# ============================================================================

# WatchdogDevice is intentionally not set. The iTCO_wdt and sp5100_tco
# drivers that create /dev/watchdog are blacklisted in modprobe.d/blacklist-watchdog.conf,
# so the device does not exist at runtime. Enabling this would produce repeated
# systemd warnings and no actual watchdog protection.
# WatchdogDevice=/dev/watchdog
# RuntimeWatchdogSec=30s
# RebootWatchdogSec=10min

# ============================================================================
# Power Management - Graceful shutdown
# ============================================================================

# Seconds to wait for devices during startup/shutdown
# Default: 90 seconds
# Recommendation: 30s (avoid long hangs on missing devices)
DefaultDeviceTimeoutSec=30s

# ============================================================================
# Kernel Parameters (via systemd)
# ============================================================================

# Control how many core dumps to keep
# Default: no limit
# Recommendation: limit to save space
# KExecLoadPath=/boot/vmlinuz-linux

# ============================================================================
# Boot Performance
# ============================================================================

# Show systemd boot progress on console
# Default: auto (depends on quiet kernel flag)
# Recommendation: auto (works with quiet)
ShowStatus=auto

# Show detailed status for slower units
# Default: no
# Recommendation: no (faster perceived boot)
StatusUnitFormat=description

# ============================================================================
# Security/Sandbox
# ============================================================================

# Default sandboxing restrictions (can be overridden per unit)
# Default: off
# Recommendation: off (most services need full access, too restrictive)
# PrivateTmp=no
# ProtectSystem=no
# ProtectHome=no

# ============================================================================
# Logging
# ============================================================================

# Log level for systemd: "emerg", "alert", "crit", "err", "warning", "notice", "info", "debug"
# Default: "info"
# Recommendation: "warning" (reduce noise, keep important messages)
LogLevel=warning

# ============================================================================
# Environment
# ============================================================================

# Default environment variables for all services
# Recommendation: set locale for consistency
DefaultEnvironment="LANG=en_US.UTF-8"

# ============================================================================
# Networking
# ============================================================================

# Allow services to use SO_REUSEADDR (useful for services restarting)
# Default: yes
# Recommendation: yes (avoid TIME_WAIT issues)
# ReuseAddress=yes
