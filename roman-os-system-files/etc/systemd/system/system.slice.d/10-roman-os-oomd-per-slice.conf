# ============================================================================
# roman-os-ISO systemd-oomd Per-Slice Policy (system services)
# ============================================================================
# Tells systemd-oomd to kill the worst memory hog inside system.slice when
# memory pressure on this slice stays above ManagedOOMMemoryPressureLimit
# for DefaultMemoryPressureDurationSec (see oomd.conf.d/10-roman-os-oomd.conf).
#
# Adopted from Garuda's systemd-oomd-defaults package (2026-05-28).
# See: roman-os-iso/docs/garuda-comparison-2026-05-28.md

[Slice]

# Enable oomd-managed kills inside this slice
ManagedOOMMemoryPressure=kill

# Pressure threshold: above 80% sustained, oomd picks a victim cgroup
ManagedOOMMemoryPressureLimit=80%
