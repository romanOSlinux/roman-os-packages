# ============================================================================
# roman-os-ISO systemd-oomd Per-Slice Policy (user sessions)
# ============================================================================
# Per-user slice equivalent of system/system.slice.d/10-roman-os-oomd-per-slice.conf.
# Applies to every user's systemd --user instance so that a runaway browser/IDE
# tab gets killed instead of dragging the desktop down with it.
#
# Adopted from Garuda's systemd-oomd-defaults package (2026-05-28).
# See: roman-os-iso/docs/garuda-comparison-2026-05-28.md

[Slice]

ManagedOOMMemoryPressure=kill
ManagedOOMMemoryPressureLimit=80%
