# ============================================================================
# Disable kernel zswap (we use zram-generator instead)
# ============================================================================
# Adopted from Garuda's disable-zswap.conf (2026-05-28 comparison study).
# See: roman-os-iso/docs/garuda-comparison-2026-05-28.md
#
# zswap (in-kernel compressed write-back cache for swap) and zram (compressed
# block device used AS swap) overlap. With zram-generator providing our swap
# (zram-generator.conf), leaving zswap on means pages get compressed twice —
# zswap compresses them as it caches, zram compresses them as they hit swap.
# Wasted CPU, no extra capacity.
#
# This tmpfile writes 0 to /sys/module/zswap/parameters/enabled on every boot
# so the setting survives kernel-cmdline omissions.
#
# Kernel-agnostic: /sys/module/zswap/parameters/enabled has existed in every
# mainline kernel since 3.11 (2013).

w /sys/module/zswap/parameters/enabled - - - - 0
