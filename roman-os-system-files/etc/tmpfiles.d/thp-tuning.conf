# ============================================================================
# Transparent Huge Page (THP) Management
# ============================================================================
# Transparent Huge Pages reduce page table overhead and improve memory efficiency
# However, aggressive defragmentation can cause latency spikes
#
# This configuration balances performance and responsiveness:
#   - Use huge pages when beneficial (deferred, madvise-driven)
#   - Avoid aggressive background defragmentation
#   - Good for desktop, workstation, and server use

# Defragmentation strategy:
#   "always" = aggressive (CPU usage spikes, not recommended for desktop)
#   "defer" = lazy defragmentation (balanced)
#   "defer+madvise" = deferred + app-requested only (recommended)
#   "madvise" = only when app requests (strict, may reduce THP usage)
#   "never" = disable defragmentation (minimal overhead)
w /sys/kernel/mm/transparent_hugepage/defrag - - - - defer+madvise

# THP shmem support (shared memory)
# Can cause issues with some apps, disable on problematic systems
w /sys/kernel/mm/transparent_hugepage/shmem_enabled - - - - advise

# Khugepaged settings - background page migration daemon
# For kernel 6.12+ (THP shrinker): split any huge page that is more than ~80%
# zero-filled (409 of 512 PTEs none). The kernel default of 511 is effectively
# "never split", which lets THP=always over-provision huge pages in sparsely
# used memory and inflate RSS. 409 brings memory usage back down toward madvise
# levels while keeping the THP performance benefit. (CachyOS uses the same value.)
w /sys/kernel/mm/transparent_hugepage/khugepaged/max_ptes_none - - - - 409

# Khugepaged scan delay (milliseconds)
# Default: 10ms, reduce to 1ms for more aggressive merging (uses more CPU)
# Increase to 100ms+ to reduce CPU overhead on systems with lots of THP
w /sys/kernel/mm/transparent_hugepage/khugepaged/scan_sleep_millisecs - - - - 10
