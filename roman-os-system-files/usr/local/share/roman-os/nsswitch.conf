# Nsswitch.conf from nemesis

# Name Service Switch configuration file.
# See nsswitch.conf(5) for details.
# we changed nsswitch.conf to have access to nas servers
# roman-os default nsswitch.conf

passwd: files systemd
group: files [SUCCESS=merge] systemd
shadow: files systemd
gshadow: files systemd

publickey: files

hosts: mymachines files mdns_minimal [NOTFOUND=return] resolve [!UNAVAIL=return] dns wins myhostname
networks: files

protocols: files
services: files
ethers: files
rpc: files

netgroup: files
